name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject tracked environment files
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '(^|/)\.env\.example$'; then
            echo "Tracked environment files are not allowed."
            exit 1
          fi
          if git grep -n -E '(gsk_|npg_)' -- ':!.github/workflows/ci.yml'; then
            echo "A tracked file contains a production-looking secret."
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build and typecheck
        run: npm run build
